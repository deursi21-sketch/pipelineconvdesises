name: 🚀 Deploy Currency Converter App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  job1-provision-infrastructure:
    name: "🏗️ Job1 - Provision EC2 avec Terraform"
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.get_ip.outputs.public_ip }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration des credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Récupération de l'IP publique
        id: get_ip
        working-directory: terraform
        run: |
          IP=$(terraform output -raw public_ip)
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ IP: $IP"

      - name: Préparation clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/vockey.pem
          # Correction si la clé est sur une seule ligne avec \n littéraux
          if ! grep -q "BEGIN" ~/.ssh/vockey.pem; then
            echo "${{ secrets.EC2_SSH_KEY }}" | tr ' ' '\n' > ~/.ssh/vockey.pem
          fi
          chmod 600 ~/.ssh/vockey.pem
          head -1 ~/.ssh/vockey.pem

      - name: Attente SSH (20min max)
        run: |
          IP=${{ steps.get_ip.outputs.public_ip }}
          echo "⏳ Attente SSH sur $IP..."
          for i in $(seq 1 120); do
            RESULT=$(ssh -o StrictHostKeyChecking=no \
                        -o ConnectTimeout=8 \
                        -o BatchMode=yes \
                        -i ~/.ssh/vockey.pem \
                        ubuntu@$IP "echo CONNECTED" 2>&1)
            if echo "$RESULT" | grep -q "CONNECTED"; then
              echo "✅ SSH OK après $i tentatives"
              exit 0
            fi
            [ $((i % 10)) -eq 0 ] && echo "⚠️ Tentative $i/120: $RESULT"
            echo "Tentative $i/120..."
            sleep 10
          done
          echo "❌ Timeout SSH. Diagnostic port 22:"
          nc -zv $IP 22 2>&1 || true
          exit 1

  job2-install-prerequisites:
    name: "📦 Job2 - Installation des prérequis"
    runs-on: ubuntu-latest
    needs: job1-provision-infrastructure
    env:
      EC2_IP: ${{ needs.job1-provision-infrastructure.outputs.public_ip }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Préparation clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/vockey.pem
          chmod 600 ~/.ssh/vockey.pem
          echo "Host *
            StrictHostKeyChecking no
            ServerAliveInterval 60
            ConnectTimeout 30" > ~/.ssh/config

      - name: Installation Node.js 20 + PM2 + serve
        run: |
          ssh -i ~/.ssh/vockey.pem ubuntu@$EC2_IP << 'ENDSSH'
            set -e
            sudo apt-get update -y
            sudo apt-get install -y curl git build-essential
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
            sudo npm install -g pm2 serve
            echo "✅ node=$(node -v) npm=$(npm -v) pm2=$(pm2 -v)"
          ENDSSH

      - name: Copie et installation backend
        run: |
          ssh -i ~/.ssh/vockey.pem ubuntu@$EC2_IP "mkdir -p ~/currency-app/backend ~/currency-app/frontend"
          scp -i ~/.ssh/vockey.pem backend/server.js backend/package.json ubuntu@$EC2_IP:~/currency-app/backend/
          ssh -i ~/.ssh/vockey.pem ubuntu@$EC2_IP "cd ~/currency-app/backend && npm install --production"

      - name: Copie et installation frontend
        run: |
          scp -i ~/.ssh/vockey.pem -r frontend/src frontend/public frontend/package.json ubuntu@$EC2_IP:~/currency-app/frontend/
          ssh -i ~/.ssh/vockey.pem ubuntu@$EC2_IP "cd ~/currency-app/frontend && npm install"

  job3-deploy-production:
    name: "🚀 Job3 - Mise en production"
    runs-on: ubuntu-latest
    needs: [job1-provision-infrastructure, job2-install-prerequisites]
    env:
      EC2_IP: ${{ needs.job1-provision-infrastructure.outputs.public_ip }}

    steps:
      - name: Préparation clé SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/vockey.pem
          chmod 600 ~/.ssh/vockey.pem
          echo "Host *
            StrictHostKeyChecking no
            ServerAliveInterval 60" > ~/.ssh/config

      - name: Build React + lancement PM2
        run: |
          ssh -i ~/.ssh/vockey.pem ubuntu@$EC2_IP bash << ENDSSH
            set -e
            cd ~/currency-app/frontend
            export REACT_APP_API_URL="http://$EC2_IP:5000"
            npm run build

            pm2 delete currency-backend 2>/dev/null || true
            pm2 delete currency-frontend 2>/dev/null || true

            cd ~/currency-app/backend
            pm2 start server.js --name currency-backend

            cd ~/currency-app/frontend
            pm2 start "serve -s build -l 3000" --name currency-frontend

            pm2 save
            pm2 list
          ENDSSH

      - name: Vérification santé
        run: |
          sleep 10
          curl -sf "http://$EC2_IP:5000/health" && echo "✅ Backend OK" || echo "⚠️ Backend KO"
          curl -sf "http://$EC2_IP:3000" > /dev/null && echo "✅ Frontend OK" || echo "⚠️ Frontend KO"

      - name: 🎉 URL finale
        run: |
          echo "================================================"
          echo "  🌐 APP  →  http://$EC2_IP:3000"
          echo "  🔌 API  →  http://$EC2_IP:5000"
          echo "================================================"
